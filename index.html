      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Neifert Automotores — Excelencia en Movimiento</title>
    <meta
      name="description"
      content="Concesionaria premium de vehículos de alta gama. Encontrá tu próximo destino."
    />

    <!-- Open Graph / WhatsApp, Facebook, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Neifert Automotores" />
    <meta property="og:title" content="Neifert Automotores — Excelencia en Movimiento" />
    <meta
      property="og:description"
      content="Concesionaria premium de vehículos de alta gama. Encontrá tu próximo destino."
    />
    <meta property="og:url" content="https://neifert.vercel.app/" />
    <meta property="og:image" content="https://neifert.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1847" />
    <meta property="og:image:height" content="923" />

    <!-- Twitter Card (algunos clientes lo usan como fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Neifert Automotores — Excelencia en Movimiento" />

      name="twitter:description"
      content="Concesionaria premium de vehículos de alta gama. Encontrá tu próximo destino."

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400;1,14..32,600&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Aplica el tema antes de pintar para evitar el flash (FOUC)
      (function () {
        try {
          var t = localStorage.getItem('nf-theme')
          if (!t)
            t = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          document.documentElement.classList.toggle('dark', t === 'dark')
          document.documentElement.style.colorScheme = t
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
